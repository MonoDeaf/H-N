<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>H+N</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="extension_icon (5).png">
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react",
        "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react",
        "htm": "https://esm.sh/htm@3.1.1",
        "@iconify/react": "https://esm.sh/@iconify/react?external=react",
        "date-fns": "https://esm.sh/date-fns@3.3.1"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            /* Fallback Variables */
            --bg-color: #000000;
            --text-primary: #f1f1f1;
            --text-secondary: #888;
            --modal-radius: 2.5rem;
            --checkin-gradient: radial-gradient(circle at 50% 120%, #37373b 0%, #101010 50%);
            --checkin-character-bg: #b5c4ff;
        }

        .eyebrow {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 0.01em;
            color: var(--eyebrow-text);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text-shimmer {
            background: linear-gradient(
                90deg, 
                var(--text-secondary) 0%, 
                var(--text-primary) 50%, 
                var(--text-secondary) 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: skeleton-shimmer 2.5s infinite linear;
            display: inline-block;
        }

        .hugeicon {
            display: inline-block;
            width: 1em;
            height: 1em;
            background-color: currentColor;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }

        /* Prevent overscroll bounce on iOS */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #root {
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* Standardize inputs for mobile */
        input[type="date"], 
        input[type="text"], 
        input[type="number"], 
        textarea {
            -webkit-appearance: none;
            appearance: none;
            font-size: 16px !important; /* Prevents iOS zoom on focus */
        }

        ::placeholder {
            color: var(--placeholder-text) !important;
            opacity: 0.7;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: var(--calendar-picker-filter, invert(1));
            opacity: 0.5;
        }

        /* Prevent system pull-to-refresh on mobile */
        body {
            overscroll-behavior-y: contain;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="App.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => {
              console.log('SW Registered');
            })
            .catch(err => console.log('SW Registration failed', err));
        });
      }
    </script>
</body>
</html>
