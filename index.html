<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>H+N</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="extension_icon (5).png">
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react",
        "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react",
        "htm": "https://esm.sh/htm@3.1.1",
        "@iconify/react": "https://esm.sh/@iconify/react?external=react",
        "date-fns": "https://esm.sh/date-fns@3.3.1"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            /* Full Dark Theme Defaults to prevent flashes and ensure consistent layout before React hydration */
            --bg-color: #000000;
            --card-bg-solid: #161616;
            --text-primary: #f1f1f1;
            --text-secondary: #888;
            --eyebrow-text: #c1c1c1;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-color: #333333;
            --nav-bg: rgba(15, 15, 15, 0.9);
            --bubble-me: #333333;
            --bubble-them: rgba(255, 255, 255, 0.1);
            --modal-bg: #121212;
            --modal-radius: 2.5rem;
            --modal-border: rgba(255, 255, 255, 0.1);
            --modal-header-text: #ffffff;
            --modal-label-text: #888;
            --modal-button-bg: #27272a;
            --modal-button-text: #ffffff;
            --modal-toggle-active-bg: #ffffff;
            --modal-toggle-active-text: #000000;
            --input-bg: rgba(255, 255, 255, 0.08);
            --profile-pill-bg: #111111;
            --profile-pill-border: #27272a;
            --dot-color: #ffffff;
            --dot-inactive: rgba(255, 255, 255, 0.15);
            --calendar-today-border: #000000;
            --indicator-active: #ffffff;
            --indicator-inactive: rgba(255, 255, 255, 0.15);
            --passcode-dot-active: #ffffff;
            --passcode-dot-inactive: rgba(255, 255, 255, 0.2);
            --radio-active: #10b981;
            --radio-inactive: rgba(255, 255, 255, 0.2);
            --action-bg: #27272a;
            --action-text: #ffffff;
            --ev-date-bg: rgba(236, 72, 153, 0.15);
            --ev-date-text: #f472b6;
            --ev-home-bg: rgba(234, 179, 8, 0.15);
            --ev-home-text: #facc15;
            --ev-travel-bg: rgba(14, 165, 233, 0.15);
            --ev-travel-text: #7dd3fc;
            --ev-other-bg: rgba(168, 85, 247, 0.15);
            --ev-other-text: #c084fc;
            --ev-milestone-bg: rgba(99, 102, 241, 0.15);
            --ev-milestone-text: #818cf8;
            --ev-holiday-bg: rgba(244, 63, 94, 0.15);
            --ev-holiday-text: #fb7185;
            --text-muted: #666666;
            --icon-muted: #888888;
            --placeholder-text: #666666;
            --surface-muted: rgba(255, 255, 255, 0.05);
            --calendar-picker-filter: invert(1);
            --checkin-gradient: radial-gradient(circle at 50% 120%, #37373b 0%, #101010 50%);
            --checkin-character-bg: #b5c4ff;
            --checkin-text: #ffffff;
            --checkin-subtext: #888888;
            --checkin-pill-bg: rgba(255, 255, 255, 0.08);
            --checkin-pill-text: #ffffff;
        }

        .eyebrow {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 0.01em;
            color: var(--eyebrow-text);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text-shimmer {
            background: linear-gradient(
                90deg, 
                var(--text-secondary) 0%, 
                var(--text-primary) 50%, 
                var(--text-secondary) 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: skeleton-shimmer 2.5s infinite linear;
            display: inline-block;
        }

        .hugeicon {
            display: inline-block;
            width: 1em;
            height: 1em;
            background-color: currentColor;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }

        /* Prevent overscroll bounce on iOS */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #root {
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* Standardize inputs for mobile */
        input[type="date"], 
        input[type="text"], 
        input[type="number"], 
        textarea {
            -webkit-appearance: none;
            appearance: none;
            font-size: 16px !important; /* Prevents iOS zoom on focus */
        }

        ::placeholder {
            color: var(--placeholder-text) !important;
            opacity: 0.7;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: var(--calendar-picker-filter, invert(1));
            opacity: 0.5;
        }

        /* Prevent system pull-to-refresh on mobile */
        body {
            overscroll-behavior-y: contain;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="App.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => {
              console.log('SW Registered');
            })
            .catch(err => console.log('SW Registration failed', err));
        });
      }
    </script>
</body>
</html>
