<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d8d8d8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>H+N</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="extension_icon@192px (1).png">
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react",
        "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react",
        "htm": "https://esm.sh/htm@3.1.1",
        "@iconify/react": "https://esm.sh/@iconify/react?external=react",
        "date-fns": "https://esm.sh/date-fns@3.3.1"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg-color: #d8d8d8;
            --text-primary: #333333;
            --text-secondary: #666666;
            --card-bg: rgba(255, 255, 255, 0.35);
            --card-border: rgba(0, 0, 0, 0.08);
            --accent-color: #333333;
            --nav-bg: rgba(235, 235, 235, 0.9);
            --bubble-me: #ffffff;
            --bubble-them: rgba(0, 0, 0, 0.1);
            --modal-bg: #e5e5e5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Prevent overscroll bounce on iOS */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #root {
            height: 100%;
            overflow: hidden;
            background-color: #e8e8e8; /* Light background for shrink effect */
        }

        /* Prevent system pull-to-refresh on mobile */
        body {
            overscroll-behavior-y: contain;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="App.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Register with a relative path to support subdirectories (like GitHub Pages)
          navigator.serviceWorker.register('sw.js')
            .then(reg => {
              console.log('SW Registered');
            })
            .catch(err => console.log('SW Registration failed', err));
        });
      }
    </script>
</body>
</html>
